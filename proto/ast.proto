syntax = "proto3";

package starkom.ast.v1;

// A range of characters within a Starkom source file.
//
// Every AST node has an optional `Range` indicating where the node is located in the original
// source file.
message Range {
  // Byte offset of the first character.
  uint32 offset = 1;

  // Number of characters in the range.
  uint32 length = 2;
}

// Represents a lexical token in a Starkom source file.
message Token {
  enum Type {
    TOKEN_TYPE_INVALID = 0;

    TOKEN_TYPE_VERSION_NUMBER = 1;

    TOKEN_TYPE_SINGLE_LINE_COMMENT = 2;
    TOKEN_TYPE_MULTI_LINE_COMMENT = 3;

    TOKEN_TYPE_IDENTIFIER = 4;

    TOKEN_TYPE_KEYWORD_ASSERT = 5;
    TOKEN_TYPE_KEYWORD_BREAK = 6;
    TOKEN_TYPE_KEYWORD_BUS = 7;
    TOKEN_TYPE_KEYWORD_COMPONENT = 8;
    TOKEN_TYPE_KEYWORD_CONST = 9;
    TOKEN_TYPE_KEYWORD_CONTINUE = 10;
    TOKEN_TYPE_KEYWORD_DO = 11;
    TOKEN_TYPE_KEYWORD_ELSE = 12;
    TOKEN_TYPE_KEYWORD_FALSE = 13;
    TOKEN_TYPE_KEYWORD_FOR = 14;
    TOKEN_TYPE_KEYWORD_FUNCTION = 15;
    TOKEN_TYPE_KEYWORD_IF = 16;
    TOKEN_TYPE_KEYWORD_INCLUDE = 17;
    TOKEN_TYPE_KEYWORD_INPUT = 18;
    TOKEN_TYPE_KEYWORD_LOG = 19;
    TOKEN_TYPE_KEYWORD_OUTPUT = 20;
    TOKEN_TYPE_KEYWORD_PARALLEL = 21;
    TOKEN_TYPE_KEYWORD_PRAGMA = 22;
    TOKEN_TYPE_KEYWORD_PUBLIC = 23;
    TOKEN_TYPE_KEYWORD_RETURN = 24;
    TOKEN_TYPE_KEYWORD_SIGNAL = 25;
    TOKEN_TYPE_KEYWORD_STARKOM = 26;
    TOKEN_TYPE_KEYWORD_TEMPLATE = 27;
    TOKEN_TYPE_KEYWORD_TRUE = 28;
    TOKEN_TYPE_KEYWORD_VAR = 29;
    TOKEN_TYPE_KEYWORD_WHILE = 30;

    TOKEN_TYPE_NUMBER_8 = 31;
    TOKEN_TYPE_NUMBER_10 = 32;
    TOKEN_TYPE_NUMBER_16 = 33;
    TOKEN_TYPE_STRING_LITERAL = 34;

    TOKEN_TYPE_LEFT_PARENTHESIS = 35;
    TOKEN_TYPE_RIGHT_PARENTHESIS = 36;
    TOKEN_TYPE_LEFT_SQUARE_BRACKET = 37;
    TOKEN_TYPE_RIGHT_SQUARE_BRACKET = 38;
    TOKEN_TYPE_LEFT_CURLY_BRACKET = 39;
    TOKEN_TYPE_RIGHT_CURLY_BRACKET = 40;

    TOKEN_TYPE_OPERATOR_UNCONSTRAINED_ASSIGN_LEFT = 41;
    TOKEN_TYPE_OPERATOR_UNCONSTRAINED_ASSIGN_RIGHT = 42;
    TOKEN_TYPE_OPERATOR_CONSTRAINED_ASSIGN_LEFT = 43;
    TOKEN_TYPE_OPERATOR_CONSTRAINED_ASSIGN_RIGHT = 44;
    TOKEN_TYPE_OPERATOR_CONSTRAINED_EQUALITY = 45;

    TOKEN_TYPE_OPERATOR_ASSIGN = 46;
    TOKEN_TYPE_OPERATOR_PLUS = 47;
    TOKEN_TYPE_OPERATOR_MINUS = 48;
    TOKEN_TYPE_OPERATOR_MULTIPLY = 49;
    TOKEN_TYPE_OPERATOR_POWER = 50;
    TOKEN_TYPE_OPERATOR_DIVIDE = 51;
    TOKEN_TYPE_OPERATOR_DIVIDE_INTEGER = 52;
    TOKEN_TYPE_OPERATOR_MODULUS = 53;
    TOKEN_TYPE_OPERATOR_INCREMENT = 54;
    TOKEN_TYPE_OPERATOR_DECREMENT = 55;

    TOKEN_TYPE_OPERATOR_LOGICAL_AND = 56;
    TOKEN_TYPE_OPERATOR_LOGICAL_OR = 57;
    TOKEN_TYPE_OPERATOR_LOGICAL_NOT = 58;

    TOKEN_TYPE_OPERATOR_BITWISE_AND = 59;
    TOKEN_TYPE_OPERATOR_BITWISE_OR = 60;
    TOKEN_TYPE_OPERATOR_BITWISE_XOR = 61;
    TOKEN_TYPE_OPERATOR_BITWISE_NOT = 62;
    TOKEN_TYPE_OPERATOR_SHIFT_LEFT = 63;
    TOKEN_TYPE_OPERATOR_SHIFT_RIGHT = 64;

    TOKEN_TYPE_OPERATOR_COMPOUND_ADD = 65;
    TOKEN_TYPE_OPERATOR_COMPOUND_SUBTRACT = 66;
    TOKEN_TYPE_OPERATOR_COMPOUND_MULTIPLY = 67;
    TOKEN_TYPE_OPERATOR_COMPOUND_POWER = 68;
    TOKEN_TYPE_OPERATOR_COMPOUND_DIVIDE = 69;
    TOKEN_TYPE_OPERATOR_COMPOUND_DIVIDE_INTEGER = 70;
    TOKEN_TYPE_OPERATOR_COMPOUND_MODULUS = 71;

    TOKEN_TYPE_OPERATOR_COMPOUND_LOGICAL_AND = 72;
    TOKEN_TYPE_OPERATOR_COMPOUND_LOGICAL_OR = 73;

    TOKEN_TYPE_OPERATOR_COMPOUND_BITWISE_AND = 74;
    TOKEN_TYPE_OPERATOR_COMPOUND_BITWISE_OR = 75;
    TOKEN_TYPE_OPERATOR_COMPOUND_BITWISE_XOR = 76;
    TOKEN_TYPE_OPERATOR_COMPOUND_SHIFT_LEFT = 77;
    TOKEN_TYPE_OPERATOR_COMPOUND_SHIFT_RIGHT = 78;

    TOKEN_TYPE_OPERATOR_COMPARE_EQUAL = 79;
    TOKEN_TYPE_OPERATOR_COMPARE_NOT_EQUAL = 80;
    TOKEN_TYPE_OPERATOR_LESS_THAN = 81;
    TOKEN_TYPE_OPERATOR_LESS_THAN_OR_EQUAL_TO = 82;
    TOKEN_TYPE_OPERATOR_GREATER_THAN = 83;
    TOKEN_TYPE_OPERATOR_GREATER_THAN_OR_EQUAL_TO = 84;

    TOKEN_TYPE_DOT = 85;
    TOKEN_TYPE_COMMA = 86;
    TOKEN_TYPE_COLON = 87;
    TOKEN_TYPE_SEMICOLON = 88;

    TOKEN_TYPE_END_OF_FILE = 89;
  }

  // Byte offset where the token is located within the original source file.
  uint32 offset = 1;

  // Token type.
  Type type = 2;

  // Token label, required for the following token types:
  //
  //   * for TOKEN_TYPE_VERSION_NUMBER the label is the version number, eg. `1.23.45`;
  //   * for TOKEN_TYPE_SINGLE_LINE_COMMENT the label is the full content of the comment not
  //     including the leading double slashes and the trailing newline;
  //   * for TOKEN_TYPE_MULTI_LINE_COMMENT the label is the full content of the comment not
  //     including the opening `/*` sequence and the closing `*/` sequence;
  //   * for TOKEN_TYPE_IDENTIFIER the label is the identifier;
  //   * for number and string literals the label is the literal exactly as it is expressed in the
  //     original source file (string literals include double quotes and have all escape codes
  //     unprocessed).
  string label = 3;
}

// Root of the AST for a Starkom source file.
message File {
  // Path of the parsed source file.
  string path = 1;

  // Byte offsets of the first character of each line.
  //
  // This data can be used to reconstruct the row & column information from the range offsets
  // associated to individual AST nodes. Since the values in this array are sorted, a O(log(N))
  // binary search is sufficient to retrieve the row index of a certain AST node.
  repeated uint32 line_starts = 2;

  // If parsing with lexical tokens has been requested, this array contains the list of lexical
  // tokens of the original source file.
  repeated Token tokens = 3;

  // Mandatory `pragma starkom` version declaration.
  Version version = 4;

  // Inclusions of other Starkom sources.
  repeated string includes = 5;

  // Function and template definitions.
  repeated Definition definitions = 6;

  // Main component definition (absent in library-only files).
  MainComponent main_component = 7;

  // Expression pool.
  //
  // Due to nesting limitations in several protobuf implementations, we don't build the AST as a
  // recursive data structure; instead we pool all expressions here and refer to them by index.
  //
  // The first element of this array is always unused so that index 0 can be used as a sentinel
  // value.
  repeated ExpressionNode expressions = 8;

  // Statement pool.
  //
  // Due to nesting limitations in several protobuf implementations, we don't build the AST as a
  // recursive data structure; instead we pool all statements here and refer to them by index.
  //
  // The first element of this array is always unused so that index 0 can be used as a sentinel
  // value.
  repeated StatementNode statements = 9;
}

// `pragma starkom 1.2.3`
message Version {
  Range range = 1;
  uint32 major = 2;
  uint32 minor = 3;
  uint32 patch = 4;
}

message Definition {
  oneof definition {
    TemplateDefinition template_definition = 1;
    FunctionDefinition function_definition = 2;
  }
}

// `template [parallel] [custom] Name(params) { body }`
message TemplateDefinition {
  Range range = 1;
  string name = 2;
  repeated string params = 3;
  uint32 body_index = 4;  // index into File.statements
}

// `function Name(params) { body }`
message FunctionDefinition {
  Range range = 1;
  string name = 2;
  repeated string params = 3;
  uint32 body_index = 4;  // index into File.statements
}

// `component main { public [sig1, sig2] } = Template(args);`
message MainComponent {
  Range range = 1;
  repeated string public_signals = 2;
  uint32 instantiation = 3;  // index into File.expressions
}

message StatementNode {
  Range range = 1;
  oneof statement {
    EmptyStatement empty = 2;
    Block block = 3;
    DeclarationStatement declaration = 4;
    ExpressionStatement expression = 5;
    IfStatement if_statement = 6;
    WhileLoopStatement while_loop_statement = 7;
    DoWhileLoopStatement do_while_loop_statement = 8;
    ForLoopStatement for_loop_statement = 9;
    BreakStatement break_statement = 10;
    ContinueStatement continue_statement = 11;
    ReturnStatement return_statement = 12;
    LogStatement log_statement = 13;
    AssertStatement assert_statement = 14;
  }
}

message EmptyStatement {}

// A group of statements surrounded by curly brackets.
message Block {
  repeated uint32 statements = 1;  // indices into File.statements
}

// A group of variable, constant, signal, or component declarations, eg. `var a, b = 12, c = 34;`
message DeclarationStatement {
  enum Type {
    DECLARATION_TYPE_VARIABLE = 0;
    DECLARATION_TYPE_CONSTANT = 1;
    DECLARATION_TYPE_SIGNAL = 2;
    DECLARATION_TYPE_COMPONENT = 3;
  }

  enum Modifier {
    MODIFIER_NONE = 0;
    MODIFIER_SIGNAL_TYPE_INPUT = 1;
    MODIFIER_SIGNAL_TYPE_OUTPUT = 2;
  }

  // Declaration of a single lexical name.
  message Declaration {
    // The only modifiers currently defined are `input` and `output` (for signals).
    Modifier modifier = 1;

    // Name of the variable being declared.
    string name = 2;

    // Each variable has zero or more array indirections, eg. `var matrix[N][M];`. The expressions
    // referred to by these indices are those which compute the cardinality of each array dimension.
    repeated uint32 dimensions = 3;  // indices into File.expressions

    // Index referring to an optional initializer expression, or 0 if the variable is not
    // initialized.
    uint32 initializer = 4;  // index into File.expressions
  }

  Type type = 1;
  repeated Declaration declarations = 2;
}

// All kinds of expressions.
message ExpressionStatement {
  uint32 expression = 1;  // index into File.expressions
}

// if (condition) { then_branch } [else { else_branch }]
message IfStatement {
  uint32 condition = 1;    // index into File.expressions
  uint32 then_branch = 2;  // index into File.statements
  uint32 else_branch = 3;  // index into File.statements
}

// while (condition) { body }
message WhileLoopStatement {
  uint32 condition = 1;  // index into File.expressions
  uint32 body = 2;       // index into File.statements
}

// do { body } while (condition);
message DoWhileLoopStatement {
  uint32 body = 1;       // index into File.statements
  uint32 condition = 2;  // index into File.expressions
}

// for (initializer; condition; step) { body }
message ForLoopStatement {
  // Initializer index into File.statements (must be a declaration, expression, or empty statement).
  uint32 initializer = 1;
  uint32 condition = 2;  // index into File.expressions
  uint32 step = 3;       // index into File.expressions
  uint32 body = 4;       // index into File.statements
}

// break;
message BreakStatement {}

// continue;
message ContinueStatement {}

// return value;
message ReturnStatement {
  uint32 return_value = 1;  // index into File.expressions
}

// log value;
message LogStatement {
  uint32 value = 1;  // index into File.expressions
}

// assert condition;
message AssertStatement {
  uint32 condition = 1;  // index into File.expressions
}

message ExpressionNode {
  Range range = 1;
  oneof expression {
    BooleanLiteral boolean_literal = 2;
    NumericLiteral numeric_literal = 3;
    StringLiteral string_literal = 4;
    ArrayLiteral array_literal = 5;
    VariableExpression variable = 6;
    SubExpression sub_expression = 7;
    TupleExpression tuple = 8;
    PostfixChainExpression postfix_chain = 9;
    PrefixChainExpression prefix_chain = 10;
    InfixExpression infix_expression = 11;
    AssignExpression assign = 12;
    UnconstrainedAssignExpression unconstrained_assign = 13;
    ConstrainedAssignExpression constrained_assign = 14;
    ConstrainedEqualityExpression constrained_equality = 15;
  };
}

// `true` or `false`.
message BooleanLiteral {
  bool value = 1;
}

// Numeric literals, eg. 42, 0xF00, and 0123.
message NumericLiteral {
  enum Base {
    NUMBER_BASE_10 = 0;
    NUMBER_BASE_16 = 1;
    NUMBER_BASE_8 = 2;
  }

  Base base = 1;

  // The numeric value, stored as a string in the specified base.
  //
  // NOTE: if the base is 16 the string must be prefixed with `0x` or `0X`, while if the base is 8
  // it must begin with a `0`. There's no prefix for base-10 literals.
  string value = 2;
}

// String literals, e.g. "hello".
message StringLiteral {
  // The literal string, stored here exactly how it's found in the original source: in quoted form
  // and with all escapes unprocessed.
  string value = 1;
}

// Array literals, eg. `[1, 2, 3]`.
message ArrayLiteral {
  repeated uint32 elements = 1;  // indices into File.expressions
}

// Expression node for simple variable references.
message VariableExpression {
  string name = 1;
}

// An expression wrapped in round brackets, eg. `(foo)`.
message SubExpression {
  uint32 inner = 1;  // indices into File.expressions
}

// `(foo, bar, baz)`
message TupleExpression {
  repeated uint32 components = 1;  // indices into File.expressions
}

// All postfix operations: field access, array subscript, function invocation, postfix increment,
// and postfix decrement.
message PostfixExpression {
  message Invocation {
    repeated uint32 arguments = 1;  // indices into File.expressions
  }

  message Increment {}
  message Decrement {}

  oneof postfix {
    // `foo.sig1`
    string field_name = 1;

    // `arr[index]`
    uint32 subscript_expression = 2;  // index into File.expressions

    // `foo(arg1, arg2, ...)`
    Invocation invocation = 3;

    // `a++`
    Increment increment = 4;

    // `a--`
    Decrement decrement = 5;
  }
}

// Chain of postfix operations on a given operand, sorted from the innermost to the outermost.
message PostfixChainExpression {
  uint32 operand = 1;  // index into File.expressions
  repeated PostfixExpression postfix = 2;
}

// Chain of prefix expressions on a given operand, sorted from the innermost to the outermost.
//
// NOTE: the innermost-to-outermost sorting is the reverse of what you see in writing! For example,
// the AST of the following expression:
//
//   ~++x
//
// lists first the pre-increment and then the bitwise not.
//
// The available prefix operations are: prefix increment, prefix decrement, logical not, bitwise
// not, unary plus, and unary minus.
message PrefixChainExpression {
  enum Type {
    PREFIX_EXRESSION_INVALID = 0;

    // `++a`
    PREFIX_EXRESSION_INCREMENT = 1;

    // `--a`
    PREFIX_EXRESSION_DECREMENT = 2;

    // `!a`
    PREFIX_EXRESSION_LOGICAL_NOT = 3;

    // `~a`
    PREFIX_EXRESSION_BITWISE_NOT = 4;

    // `+a`
    PREFIX_EXRESSION_UNARY_PLUS = 5;

    // `-a`
    PREFIX_EXRESSION_UNARY_MINUS = 6;
  }

  uint32 operand = 1;  // index into File.expressions
  repeated Type types = 2;
}

// All infix expression types. This does not include assignment expressions, which are defined
// below in `*AssignExpression` messages.
//
// NOTE: each infix operator has its own associativity order, but the parsed format is flattened
// across all operands so it doesn't express the associativity. Any algorithms scanning the AST must
// be aware of the associativity order of every operator, which is noted in the `Type` enum elements
// below. Almost all operators are left-associative (ie. `a + b + c == (a + b) + c`), but
// exponentiation is right-associative (eg. `x ** 2 ** k == x ** (2 ** k)`).
message InfixExpression {
  enum Type {
    INFIX_EXPRESSION_INVALID = 0;

    // `a + b` (left-associative)
    INFIX_EXPRESSION_TYPE_ADD = 1;

    // `a - b` (left-associative)
    INFIX_EXPRESSION_TYPE_SUBTRACT = 2;

    // `a * b` (left-associative)
    INFIX_EXPRESSION_TYPE_MULTIPLY = 3;

    // `a ** b` (right-associative)
    INFIX_EXPRESSION_TYPE_POWER = 4;

    // Multiplication by the field inverse, that is: `a / b`, which is equivalent to `a * b**-1`.
    // This is left-associative.
    INFIX_EXPRESSION_TYPE_DIVIDE = 5;

    // Integer division: `a \ b`. This is left-associative.
    INFIX_EXPRESSION_TYPE_DIVIDE_INTEGER = 6;

    // Remainder of the integer division: `a % b`. Left-associative.
    INFIX_EXPRESSION_TYPE_MODULUS = 7;

    // `a && b` (left-associative)
    INFIX_EXPRESSION_TYPE_LOGICAL_AND = 8;

    // `a || b` (left-associative)
    INFIX_EXPRESSION_TYPE_LOGICAL_OR = 9;

    // `a & b` (left-associative)
    INFIX_EXPRESSION_TYPE_BITWISE_AND = 10;

    // `a | b` (left-associative)
    INFIX_EXPRESSION_TYPE_BITWISE_OR = 11;

    // `a ^ b` (left-associative)
    INFIX_EXPRESSION_TYPE_BITWISE_XOR = 12;

    // `a << b` (left-associative)
    INFIX_EXPRESSION_TYPE_SHIFT_LEFT = 13;

    // `a >> b` (left-associative)
    INFIX_EXPRESSION_TYPE_SHIFT_RIGHT = 14;

    // `a < b` (left-associative)
    INFIX_EXPRESSION_TYPE_LESS_THAN = 15;

    // `a <= b` (left-associative)
    INFIX_EXPRESSION_TYPE_LESS_THAN_OR_EQUAL_TO = 16;

    // `a > b` (left-associative)
    INFIX_EXPRESSION_TYPE_GREATER_THAN = 17;

    // `a >= b` (left-associative)
    INFIX_EXPRESSION_TYPE_GREATER_THAN_OR_EQUAL_TO = 18;

    // `a == b` (left-associative)
    INFIX_EXPRESSION_TYPE_EQUAL_TO = 19;

    // `a != b` (left-associative)
    INFIX_EXPRESSION_TYPE_NOT_EQUAL_TO = 20;
  }

  Type type = 1;
  uint32 lhs = 2;  // index into File.expressions
  uint32 rhs = 3;  // index into File.expressions
}

// Non-signal assignment, eg. `a = b`.
message AssignExpression {
  enum Type {
    ASSIGNMENT_TYPE_SIMPLE = 0;
    ASSIGNMENT_TYPE_COMPOUND_ADD = 1;
    ASSIGNMENT_TYPE_COMPOUND_SUBTRACT = 2;
    ASSIGNMENT_TYPE_COMPOUND_MULTIPLY = 3;
    ASSIGNMENT_TYPE_COMPOUND_POWER = 4;
    ASSIGNMENT_TYPE_COMPOUND_DIVIDE = 5;
    ASSIGNMENT_TYPE_COMPOUND_DIVIDE_INTEGER = 6;
    ASSIGNMENT_TYPE_COMPOUND_MODULUS = 7;
    ASSIGNMENT_TYPE_COMPOUND_LOGICAL_AND = 8;
    ASSIGNMENT_TYPE_COMPOUND_LOGICAL_OR = 9;
    ASSIGNMENT_TYPE_COMPOUND_BITWISE_AND = 10;
    ASSIGNMENT_TYPE_COMPOUND_BITWISE_OR = 11;
    ASSIGNMENT_TYPE_COMPOUND_BITWISE_XOR = 12;
    ASSIGNMENT_TYPE_COMPOUND_SHIFT_LEFT = 13;
    ASSIGNMENT_TYPE_COMPOUND_SHIFT_RIGHT = 14;
  }

  Type type = 1;
  uint32 lhs = 2;  // index into File.expressions (must be a single identifier)
  uint32 rhs = 3;  // index into File.expressions
}

// Direction of constrained & unconstrained assignments, e.g. `a <== b` is right-to-left. Note that
// this is purely cosmetic, it doesn't affect the general semantics in any way. It only affects the
// meaning of the `lhs` and `rhs` fields of the assignment protos defined below.
enum AssignmentDirection {
  ASSIGNMENT_DIRECTION_INVALID = 0;

  // `a <== b`
  ASSIGNMENT_DIRECTION_RIGHT_TO_LEFT = 1;

  // `a ==> b`
  ASSIGNMENT_DIRECTION_LEFT_TO_RIGHT = 2;
}

// Unconstrained assignments, eg. `a <-- b`.
//
// NOTE: the assignee must be a single identifier.
message UnconstrainedAssignExpression {
  AssignmentDirection direction = 1;
  uint32 lhs = 2;  // index into File.expressions
  uint32 rhs = 3;  // index into File.expressions
}

// Constrained assignments, eg. `a <== b`.
//
// NOTE: the assignee must be a single identifier.
message ConstrainedAssignExpression {
  AssignmentDirection direction = 1;
  uint32 lhs = 2;  // index into File.expressions
  uint32 rhs = 3;  // index into File.expressions
}

// Equality constraints, eg. `a === b`.
message ConstrainedEqualityExpression {
  uint32 lhs = 1;  // index into File.expressions
  uint32 rhs = 2;  // index into File.expressions
}
